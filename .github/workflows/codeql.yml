name: CodeQL

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "25 13 * * 2"

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: codeql-${{ matrix.language }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    permissions:
      contents: read
      actions: read          # Required for CodeQL action metadata resolution
      security-events: write # Upload CodeQL SARIF results to GitHub Advanced Security

    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Initialize CodeQL
        uses: github/codeql-action/init@d6bbdef45e766d081b84a2def353b0055f728d3e # v3.29.3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          build-mode: none
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@d6bbdef45e766d081b84a2def353b0055f728d3e # v3.29.3
        with:
          category: "/language:${{matrix.language}}"
