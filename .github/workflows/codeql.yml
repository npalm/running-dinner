name: CodeQL

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "25 13 * * 2"

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: codeql-${{ matrix.language }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    permissions:
      contents: read
      actions: read          # Required for CodeQL action metadata resolution
      security-events: write # Upload CodeQL SARIF results to GitHub Advanced Security

    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          build-mode: none
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:${{matrix.language}}"
